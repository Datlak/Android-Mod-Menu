name: Build Android Mod Menu APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout mã nguồn
      uses: actions/checkout@v4

    - name: Thiết lập Java 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'
        cache: 'gradle'

    - name: Tải trực tiếp Gradle Wrapper chuẩn
      run: |
        mkdir -p gradle/wrapper
        curl -L -o gradle/wrapper/gradle-wrapper.jar https://github.com/gradle/gradle/raw/v8.0.0/gradle/wrapper/gradle-wrapper.jar

    - name: Cấp quyền thực thi cho Gradle
      run: chmod +x gradlew

    - name: Dựng file APK (Debug)
      run: ./gradlew assembleDebug

    - name: Tải file APK lên Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: Android-Mod-Menu-APK
        path: app/build/outputs/apk/debug/app-debug.apk
        
