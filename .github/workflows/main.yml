name: Build Android Mod Menu APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout mã nguồn
      uses: actions/checkout@v4

    - name: Thiết lập Java 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Cài đặt Gradle từ hệ thống
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: 8.0

    - name: Dựng file APK bằng Gradle hệ thống
      run: gradle assembleDebug

    - name: Tải file APK lên Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: Android-Mod-Menu-APK
        path: app/build/outputs/apk/debug/app-debug.apk
        
